name: CI

on:
  push:
    branches: [main, master, "copilot/**"]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  test:
    name: Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: quantsink
          POSTGRES_PASSWORD: quantsink
          POSTGRES_DB: quantsink_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://quantsink:quantsink@localhost:5432/quantsink_test
      QUANTMAIL_JWT_SECRET: test-secret-for-ci
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Run tests
        run: npm test -- --ci --coverage

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [lint-and-build]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t quantsink:${{ github.sha }} .
